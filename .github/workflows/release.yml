name: publish to npmjs
on:
  release:
    # it is simpler to have separate release.yml and prerelease.yml workflows,
    # however, on npm you can only associate one workflow as trusted (or however
    # it's called exactly) - so we need to combine both in one workflow, with
    # the if conditions on the steps.
    types: [released, prereleased]

jobs:
  publish:
    environment: npm
    if: github.repository == 'sverweij/virtual-code-owners'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 26.x
          registry-url: https://registry.npmjs.org
      # staged publishing works as of npm@11.15.0. Until that that or higher is
      # shipped with nodejs by default we need to install it manually.
      - run: npm install -g npm@11.18.0 --ignore-scripts
      - name: print node & npm versions
        run: |
          node --version
          npm --version
      - run: npm clean-install --ignore-scripts
      - run: node --run=build
      - run: node --run=test
      - name: publish as latest
        run: npm staged publish --provenance --access public
        if: github.event.release.prerelease == false
      - name: publish as beta
        run: npm staged publish --provenance --access public --tag beta
        if: github.event.release.prerelease == true
